<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sub Loader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Sub Loader</h1>
    
    <div class="section">
      <label for="subtitle-input">Subtitle URL or File:</label>
      <input 
        type="text" 
        id="subtitle-input" 
        placeholder="Paste subtitle URL (VTT, SRT) or browse file"
        class="input-field"
      >
      <button id="browse-btn" class="btn btn-secondary">Browse File</button>
    </div>

    <div class="section">
      <label for="subtitle-language">Language:</label>
      <select id="subtitle-language" class="input-field">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ja">Japanese</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="zh">Chinese</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="section">
      <label>
        <input type="checkbox" id="auto-load" checked>
        Auto-load on Netflix pages
      </label>
    </div>

    <button id="load-btn" class="btn btn-primary">Load Subtitles</button>
    <button id="remove-btn" class="btn btn-danger">Remove Subtitles</button>

    <div id="status" class="status"></div>

    <div class="section recent">
      <h3>Recent Subtitles</h3>
      <ul id="recent-list" class="recent-list"></ul>
      <button id="clear-history-btn" class="btn btn-small">Clear History</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
